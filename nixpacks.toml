[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
    "cd backend && python -m venv venv && . venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt",
    "cd frontend && npm ci"
]

[phases.build]
cmds = [
    "cd frontend && npm run build"
]

# CRITICAL: Explicitly set start command to prevent Streamlit auto-detection
# Railway/Nixpacks will NOT auto-detect Streamlit if start command is explicitly set
# This MUST be set to use FastAPI, not Streamlit
[start]
cmd = "./start.sh"

# Variables to prevent auto-detection
[variables]
NIXPACKS_NO_AUTO_DETECT = "true"
# Explicitly tell Nixpacks this is NOT a Streamlit app
NIXPACKS_PROVIDER = "nixpacks"

