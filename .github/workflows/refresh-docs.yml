name: Weekly docs refresh

on:
  schedule:
    - cron: '0 2 * * 1' # Every Monday at 2am UTC
  workflow_dispatch: # Also allow manual trigger from GitHub Actions UI
    inputs:
      force:
        description: 'Force full re-sync and full ingest (ignore manifest / changed-only)'
        required: false
        default: 'false'
      ingest_prefix:
        description: >-
          Targeted ingest: S3 key substring (skips --changed-only).
          Example: adobe-docs/customer-journey-analytics/help/cja-main
        required: false
        default: ''
      ingest_product:
        description: >-
          Optional product filter for targeted ingest (use with ingest_prefix).
          Example: Customer Journey Analytics
        required: false
        default: ''

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install boto3 requests python-dotenv "chromadb==1.2.2" httpx pyyaml

      # ── Restore state from S3 ─────────────────────────────────────────────
      # Download the sync manifest so SHA-based skipping works across runs.
      # Download the existing ChromaDB so only changed docs get re-embedded.
      - name: Restore sync manifest from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          mkdir -p data
          aws s3 cp s3://experienceleaguechatbot/state/sync_manifest.json data/sync_manifest.json \
            && echo "Manifest restored" \
            || echo "No manifest found — will do full sync"

      - name: Restore metadata registry from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp s3://experienceleaguechatbot/state/metadata_registry.json data/metadata_registry.json \
            && echo "Registry restored" \
            || echo "No registry in S3 — sync step will rebuild it"

      - name: Restore ChromaDB from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp s3://experienceleaguechatbot/chroma_db/chroma_db.tar.gz /tmp/chroma_db.tar.gz \
            && tar -xzf /tmp/chroma_db.tar.gz \
            && echo "ChromaDB restored ($(du -sh chroma_db | cut -f1))" \
            || echo "No ChromaDB found — will do full ingest"

      # ── Sync GitHub → S3 ──────────────────────────────────────────────────
      # Sources synced:
      #   AdobeDocs/analytics.en          → adobe-docs/adobe-analytics/
      #   AdobeDocs/analytics-platform.en → adobe-docs/customer-journey-analytics/
      #   AdobeDocs/customer-journey-analytics-learn.en → adobe-docs/customer-journey-analytics-learn/
      #   AdobeDocs/experience-platform.en → adobe-docs/experience-platform/
      #   AdobeDocs/target.en             → adobe-docs/adobe-target/
      #   AdobeDocs/journey-optimizer.en  → adobe-docs/adobe-journey-optimizer/  [AJO]
      #   AdobeDocs/experience-platform.en (help/tags/, help/collection/, help/datastreams/) → adobe-docs/data-collection/
      #   AdobeDocs/platform-learn.en     → adobe-docs/platform-learn/
      # Writes data/changed_s3_keys.txt with the S3 keys of files that changed.
      - name: Sync GitHub → S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_S3_BUCKET: experienceleaguechatbot
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          python scripts/sync_docs_to_s3.py $ARGS

      # Save the updated manifest immediately so it's preserved even if later steps fail.
      - name: Save sync manifest to S3
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          if [ -f data/sync_manifest.json ]; then
            aws s3 cp data/sync_manifest.json s3://experienceleaguechatbot/state/sync_manifest.json
            echo "Manifest saved"
          fi
          if [ -f data/metadata_registry.json ]; then
            aws s3 cp data/metadata_registry.json s3://experienceleaguechatbot/state/metadata_registry.json
            echo "Registry saved"
          fi

      # ── Ingest into ChromaDB ──────────────────────────────────────────────
      # Default: --changed-only (docs updated in sync step only).
      # ingest_prefix: targeted batch ingest (e.g. first-time cja-main backfill).
      # force=true: full ingest of entire registry.
      - name: Ingest into ChromaDB
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_S3_BUCKET: experienceleaguechatbot
          BEDROCK_REGION: us-east-1
        run: |
          if [ -n "${{ github.event.inputs.ingest_prefix }}" ]; then
            echo "Targeted ingest prefix=${{ github.event.inputs.ingest_prefix }}"
            if [ -n "${{ github.event.inputs.ingest_product }}" ]; then
              python scripts/ingest_to_chroma.py \
                --prefix "${{ github.event.inputs.ingest_prefix }}" \
                --product "${{ github.event.inputs.ingest_product }}"
            else
              python scripts/ingest_to_chroma.py \
                --prefix "${{ github.event.inputs.ingest_prefix }}"
            fi
          elif [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Full ingest (force=true)"
            python scripts/ingest_to_chroma.py
          else
            echo "Incremental ingest (--changed-only)"
            python scripts/ingest_to_chroma.py --changed-only
          fi

      - name: Enrich citation metadata (targeted)
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.ingest_prefix != '' || github.event.inputs.ingest_product != '')
        run: |
          if [ -n "${{ github.event.inputs.ingest_prefix }}" ] && [ -n "${{ github.event.inputs.ingest_product }}" ]; then
            python scripts/enrich_citation_metadata.py \
              --prefix "${{ github.event.inputs.ingest_prefix }}" \
              --product "${{ github.event.inputs.ingest_product }}"
          elif [ -n "${{ github.event.inputs.ingest_prefix }}" ]; then
            python scripts/enrich_citation_metadata.py \
              --prefix "${{ github.event.inputs.ingest_prefix }}"
          elif [ -n "${{ github.event.inputs.ingest_product }}" ]; then
            python scripts/enrich_citation_metadata.py \
              --product "${{ github.event.inputs.ingest_product }}"
          else
            python scripts/enrich_citation_metadata.py
          fi

      # HTTP-validate derived EXL URLs and write url/url_source on changed chunks.
      - name: Enrich citation metadata (changed docs)
        if: |
          !(github.event_name == 'workflow_dispatch' && github.event.inputs.ingest_prefix != '')
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ] || [ -s data/changed_s3_keys.txt ]; then
            ARGS=""
            if [ "${{ github.event.inputs.force }}" != "true" ] && [ -s data/changed_s3_keys.txt ]; then
              ARGS="--changed-only"
            fi
            python scripts/enrich_citation_metadata.py $ARGS
          else
            echo "No doc changes — skipping citation enrichment"
          fi

      - name: Media enrichment
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_S3_BUCKET: experienceleaguechatbot
        run: python scripts/ingest_with_media.py

      - name: Upload ChromaDB → S3
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_S3_BUCKET: experienceleaguechatbot
        run: python scripts/upload_chroma_to_s3.py
