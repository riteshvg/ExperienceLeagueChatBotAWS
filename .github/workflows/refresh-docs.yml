name: Weekly docs refresh

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday at 2am UTC
  workflow_dispatch:        # Also allow manual trigger from GitHub Actions UI
    inputs:
      force:
        description: 'Force full re-sync (ignore manifest)'
        required: false
        default: 'false'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install boto3 requests python-dotenv chromadb

      - name: Sync GitHub → S3
        # Sources synced:
        #   AdobeDocs/analytics.en          → adobe-docs/adobe-analytics/
        #   AdobeDocs/analytics-platform.en → adobe-docs/customer-journey-analytics/
        #   AdobeDocs/experience-platform.en → adobe-docs/experience-platform/
        #   AdobeDocs/target.en             → adobe-docs/adobe-target/
        #   AdobeDocs/journey-optimizer.en  → adobe-docs/adobe-journey-optimizer/  [AJO]
        #   AdobeDocs/experience-platform.en (help/tags/)       → adobe-docs/data-collection/  [Data Collection]
        #   AdobeDocs/experience-platform.en (help/web-sdk/)    → adobe-docs/data-collection/  [Data Collection]
        #   AdobeDocs/experience-platform.en (help/datastreams/) → adobe-docs/data-collection/ [Data Collection]
        #   AdobeDocs/experience-platform.en (help/collection/) → adobe-docs/data-collection/  [Data Collection]
        #   AdobeDocs/platform-learn.en     → adobe-docs/platform-learn/                       [Data Collection]
        # Also regenerates data/metadata_registry.json entries for AJO and Data Collection sources.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_S3_BUCKET: experienceleaguechatbot
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          python scripts/sync_docs_to_s3.py $ARGS

      - name: Ingest into ChromaDB
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_S3_BUCKET: experienceleaguechatbot
          BEDROCK_REGION: us-east-1
        run: python scripts/ingest_to_chroma.py

      - name: Media enrichment
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_S3_BUCKET: experienceleaguechatbot
        run: python scripts/ingest_with_media.py

      - name: Upload ChromaDB → S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_S3_BUCKET: experienceleaguechatbot
        run: python scripts/upload_chroma_to_s3.py
